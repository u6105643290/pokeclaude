<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeClaude - Crypto Creature RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Press Start 2P', monospace;
    }

    #game-container {
      width: 100%;
      height: 100%;
    }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-screen .title {
      font-size: 24px;
      color: #F7931A;
      text-shadow: 0 0 20px #F7931A88;
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }

    #loading-screen .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #627EEA;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #loading-screen .load-text {
      margin-top: 20px;
      font-size: 10px;
      color: #888;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
  <script type="module" crossorigin src="/pokeclaude/assets/index-CYWQK5Jm.js"></script>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="title">PokeClaude</div>
    <div class="spinner"></div>
    <div class="load-text">Initializing CryptoVerse...</div>
  </div>

  <!-- Game canvas mounts here -->
  <div id="game-container"></div>

  <script>
    // Hide loading screen once the game is ready
    window.addEventListener('gameReady', () => {
      document.getElementById('loading-screen').classList.add('hidden');
    });
  </script>

  <!-- Game entry point -->
</body>
</html>
